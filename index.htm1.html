<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEP Suits</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: black;
    color: white;
    padding: 20px;
    text-align: center;
}

nav {
    background: #333;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #ddd;
}

section.container {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.product {
    background: white;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.product img {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    border-radius: 5px;
}

button {
    background: black;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
    border-radius: 5px;
}

button:hover {
    background: gray;
}

footer {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}
</style>
</head>

<body>

<header id="home">
    <h1>BEP SUITS</h1>
    <p>Elegant. Modern. Powerful.</p>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#shop">Shop</a>
    <a href="#contact">Contact</a>
</nav>

<section id="shop" class="container">
    <h2>Our Suits Collection</h2>
    <div class="products">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1593032465171-8c6f1f0d2d6c" alt="Classic Black Suit">
            <h3>Classic Black Suit</h3>
            <p>$50</p>
            <button onclick="buy('Classic Black Suit', 50)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="Navy Blue Suit">
            <h3>Navy Blue Suit</h3>
            <p>$65</p>
            <button onclick="buy('Navy Blue Suit', 65)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1598033129183-c4f50c736f10" alt="Grey Premium Suit">
            <h3>Grey Premium Suit</h3>
            <p>$80</p>
            <button onclick="buy('Grey Premium Suit', 80)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1617127365659-c47fa864d8bc" alt="Luxury Wedding Suit">
            <h3>Luxury Wedding Suit</h3>
            <p>$100</p>
            <button onclick="buy('Luxury Wedding Suit', 100)">Add to Cart</button>
        </div>
    </div>
</section>

<footer id="contact">
    <h3>Contact BEP Suits</h3>
    <p>📞 Phone: 0599669296</p>
    <p>📧 Email: buabengebop0@gmail.com</p>
    <p>© 2026 BEP Suits</p>
</footer>

<script>
let cart = [];

function buy(productName, price) {
    cart.push({name: productName, price: price});
    alert(productName + " added to cart! Total items: " + cart.length);
    console.log("Cart:", cart);
}
</script>

</body>
</html>
